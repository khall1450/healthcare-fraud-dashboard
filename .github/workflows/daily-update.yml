name: Daily Data Update

on:
  schedule:
    - cron: '0 12 * * *'  # Noon UTC = 7 AM ET
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest data
        shell: pwsh
        run: ./update.ps1 -Silent

      - name: Fix encoding artifacts
        run: python3 fix_encoding.py data/actions.json

      - name: Embed data into index.html
        run: python3 embed_data.py data/actions.json index.html

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/actions.json index.html
          git diff --staged --quiet || git commit -m "Daily data update $(date -u +%Y-%m-%d)"
          git push
